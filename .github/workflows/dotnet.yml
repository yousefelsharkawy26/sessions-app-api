# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Start API Server
      run: |
        dotnet run --project src/SessionApp.API &
      env:
        ASPNETCORE_ENVIRONMENT: Development
    - name: Wait for API Server to Listen
      run: |
        for i in {1..30}; do
          curl -s http://localhost:5108/swagger/index.html && echo "API is ready" && break || sleep 2
        done
    - name: Run E2EE Integration Tests
      run: python3 tests/integration_test.py
